removeStrategy:
  rbac: SYNC
  items: NONE
items:
- kind: pipeline
  name: findNodeJS
  concurrentBuild: true
  definition:
    cpsFlowDefinition:
      sandbox: true
      script: "pipeline {\n    agent {\n        label 'nodejs'\n    }\n    \n    stages\
        \ {\n        stage('location') {\n            steps {\n                container('node')\
        \ {\n                    sh 'which node'\n                    sh \"which npm\"\
        \n                }\n            }\n        }\n    }\n}\n"
  description: ''
  disabled: false
  displayName: findNodeJS
  resumeBlocked: false
- kind: pipeline
  name: unify-learning-app
  concurrentBuild: true
  definition:
    cpsScmFlowDefinition:
      scriptPath: Jenkinsfile
      scm:
        scmGit:
          userRemoteConfigs:
          - userRemoteConfig:
              url: https://github.com/kchhan/unify-learning-app.git
          branches:
          - branchSpec:
              name: '*/main'
      lightweight: true
  description: ''
  disabled: false
  displayName: unify-learning-app
  resumeBlocked: false
- kind: multibranch
  name: unify-learning-app-mb
  displayName: unify-learning-app-mb
  orphanedItemStrategy:
    defaultOrphanedItemStrategy:
      pruneDeadBranches: true
      daysToKeep: -1
      numToKeep: -1
      abortBuilds: false
  projectFactory:
    workflowBranchProjectFactory:
      scriptPath: Jenkinsfile
  properties:
  - envVars: {}
  - cBPOptOutProperty:
      cbpOptOut: false
  sourcesList:
  - branchSource:
      source:
        github:
          apiUri: https://api.github.com
          traits:
          - gitHubBranchDiscovery:
              strategyId: 1
          - gitHubPullRequestDiscovery:
              strategyId: 2
          - gitHubForkDiscovery:
              trust:
                gitHubTrustPermissions: {}
              strategyId: 2
          repoOwner: kchhan
          id: '1'
          repository: unify-learning-app
          configuredByUrl: true
          repositoryUrl: https://github.com/kchhan/unify-learning-app.git
      strategy:
        allBranchesSame: {}